<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order | Nykaa</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        .logo { color: #e80071; font-weight: bold; font-size: 26px; margin-bottom: 20px; letter-spacing: 2px; }
        h3 { margin-bottom: 10px; color: #333; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; background-color: #e80071; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .result-page { display: none; text-align: left; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status-badge { background: #e6f4ea; color: #1e7e34; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .detail-row { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 16px; font-weight: 500; color: #222; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">NYKAA</div>
        
        <div id="inputView">
            <h3>Track Order</h3>
            <p style="font-size: 13px; color: #666;">Enter your order ID below.</p>
            <input type="text" id="orderIdInput" placeholder="Order ID" autofocus>
            <button onclick="checkOrder()">Track</button>
        </div>

        <div id="resultView" class="result-page">
            <div class="status-badge">🚚 OUT FOR DELIVERY</div>
            <div class="detail-row">
                <div class="label">Order ID</div>
                <div class="value">NYK-37758329-0209276</div>
            </div>
            <div class="detail-row">
                <div class="label">Ordered By</div>
                <div class="value">Nishant Singh</div>
            </div>
            <div class="detail-row">
                <div class="label">Order Date</div>
                <div class="value">25th March 2026</div>
            </div>
            <p style="font-size: 13px; color: #777; margin-top: 20px; line-height: 1.4;">Your order is arriving today! Please keep your phone reachable.</p>
        </div>
    </div>

    <script>
        function checkOrder() {
            const input = document.getElementById('orderIdInput').value.trim();
            const targetId = "NYK-37758329-0209276";

            if (input === targetId) {
                document.getElementById('inputView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
            } else {
                alert("Invalid Order ID. Please check and try again.");
            }
        }

        document.getElementById("orderIdInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkOrder();
        });
    </script>
</body>
</html>
